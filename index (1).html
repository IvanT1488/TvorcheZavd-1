<!DOCTYPE html>
<html>
  <head>
    <title>Club</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+SC&display=swap" rel="stylesheet">
  </head>
  <body>
      <h1>Ласкаво просимо до Каштанового картелю!</h1>
      <p>Це сайт для тих, хто хоче покращити свою ауру, та стати гідним учасником нашої організації.</p>
      <h2>Фото нашої діяльності</h2>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTUGFyXcJ2MtSSUlLp4QqeTXhRMy7IDowisBA&s" alt="Фото організації" width="300">
      <h2>Чим ми займаємося</h2>
      <ul>
          <li>Продаємо каштани</li>
          <li>Допомагаємо вийти з боргу аури</li>
          <li>profit</li>
      </ul>
      <h2>Зв'яжіться з нами</h2>
      <form action="#" method="post">
          <label for="name">Ім'я:</label>
          <input type="text" id="name" name="name" required><br><br>
          <label for="message">Повідомлення:</label><br>
          <textarea id="message" name="message" rows="4" required></textarea><br><br>
          <button type="submit">Надіслати</button>
      </form>
  </body>
</html>
